services:
  - type: web
    name: dd-logo-scraper
    runtime: docker
    dockerfilePath: ./Dockerfile
    # MEASURED, not guessed (tests/measure_memory.py, peak RSS of worker+browser):
    #
    #   default (4 pages)                       1530 MB
    #   LOW_MEMORY=1 (1 page, headless-shell)    850-915 MB
    #   GoFan stage only (no browser)              78 MB
    #
    # So the browser stage does NOT fit a 512 MB instance -- not even at its
    # absolute minimum. On free/starter it gets OOM-killed the moment Chromium
    # launches: the container restarts, in-flight jobs die, and the client sees the
    # job vanish (reproduced live on a free-tier deploy: gofan 21/26 -> website 0/26
    # -> 404). If you must stay on 512 MB, set SKIP_WEBSITE_LOGO=1 below and accept
    # GoFan columns only.
    plan: standard
    healthCheckPath: /health
    envVars:
      # Set to the Vercel domain once the frontend is deployed. "*" is fine while
      # there is no auth, but tighten it.
      - key: FRONTEND_ORIGIN
        value: "*"

      # MUST stay 1. JOBS lives in the uvicorn process's memory, so a second
      # worker would not see jobs created by the first; and two concurrent
      # Chromium jobs would exceed 2 GB.
      - key: MAX_CONCURRENT_JOBS
        value: "1"

      # Timeout budget, layered so a real job self-closes gracefully and still
      # flushes partial output before the hard watchdog fires:
      #   CLOSESPIDER_TIMEOUT (1800) x2 spiders = 3600 < JOB_MAX_RUNTIME (4200)
      - key: CLOSESPIDER_TIMEOUT
        value: "1800"
      - key: JOB_MAX_RUNTIME_SECONDS
        value: "4200"

      - key: MEMUSAGE_LIMIT_MB
        value: "1400"
      - key: MEMUSAGE_WARNING_MB
        value: "1100"

      # Chromium is the memory ceiling here (~150-250 MB per open page); this is
      # the first thing to turn down if jobs get OOM-killed.
      - key: PLAYWRIGHT_MAX_PAGES
        value: "4"
      - key: PLAYWRIGHT_NAV_TIMEOUT_MS
        value: "60000"

      # LOW_MEMORY=1 -> 1 page, chromium-headless-shell, --single-process.
      # Halves peak RSS (1530 -> ~900 MB) and is actually FASTER (21s vs 31s for
      # 6 rows), because a single page with images blocked beats four contending
      # ones. Still not enough for 512 MB. Off by default: --single-process is
      # unsupported by Playwright and can destabilise Chromium, so only pay that
      # risk when the RAM genuinely isn't there.
      # - key: LOW_MEMORY
      #   value: "1"

      # Escape hatch for a 512 MB instance: skip the browser stage entirely.
      # The GoFan stage peaks at 78 MB and still fills `gofan logo url` +
      # `gofan url` for 24/26 rows; only `official website logo` is left blank.
      # - key: SKIP_WEBSITE_LOGO
      #   value: "1"

      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: SCRAPY_LOG_LEVEL
        value: "INFO"
